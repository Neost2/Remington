name: UI Build Check

on:
  push:
    branches: [main]
    paths:
      - "carepath-ui/**"
      - "amplify.yml"
  pull_request:
    branches: [main]
    paths:
      - "carepath-ui/**"
      - "amplify.yml"

jobs:
  build:
    name: Build carepath-ui
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: carepath-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: carepath-ui

      - name: Build
        run: npm run build
        working-directory: carepath-ui
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || '' }}
